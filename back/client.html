<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Elevator - Control Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .elevators-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .elevator-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .elevator-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.15);
        }

        .elevator-title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .status-display {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
            padding: 15px;
            background: #f5f7fa;
            border-radius: 8px;
        }

        .status-item {
            display: flex;
            flex-direction: column;
        }

        .status-label {
            font-size: 12px;
            color: #666;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .status-value {
            font-size: 18px;
            font-weight: bold;
            color: #667eea;
        }

        .floor-controller {
            margin-bottom: 15px;
        }

        .floor-label {
            font-size: 12px;
            color: #666;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .floor-buttons {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 10px;
        }

        .floor-btn {
            padding: 12px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .floor-btn:hover {
            border-color: #667eea;
            background: #f0f0ff;
        }

        .floor-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .floor-input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
        }

        .door-controls,
        .action-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .action-controls {
            grid-template-columns: 1fr;
        }

        .btn {
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #764ba2;
            color: white;
        }

        .btn-secondary:hover {
            background: #653a7f;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: #f56565;
            color: white;
        }

        .btn-danger:hover {
            background: #e53e3e;
            transform: translateY(-2px);
        }

        .btn.loading {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .events-panel {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            margin-top: 20px;
        }

        .events-title {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
        }

        .events-log {
            background: #1e1e1e;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            padding: 15px;
            border-radius: 8px;
            max-height: 300px;
            overflow-y: auto;
            line-height: 1.5;
        }

        .event-item {
            margin-bottom: 8px;
            padding: 8px;
            background: rgba(0,255,0,0.1);
            border-left: 3px solid #00ff00;
            padding-left: 12px;
        }

        .event-time {
            color: #888;
            font-weight: bold;
        }

        .event-type {
            color: #ffff00;
            font-weight: bold;
        }

        .error {
            color: #ff6b6b;
        }

        .success {
            color: #51cf66;
        }

        .warning {
            color: #ffd93d;
        }

        @media (max-width: 768px) {
            .elevators-grid {
                grid-template-columns: 1fr;
            }

            .floor-buttons {
                grid-template-columns: repeat(3, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛗 Smart Elevator Control Panel</h1>

        <div class="elevators-grid" id="elevatorsContainer"></div>

        <div class="events-panel">
            <div class="events-title">📊 Eventos en Tiempo Real</div>
            <div class="events-log" id="eventsLog"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8080/api/v1/elevators';
        const MAX_FLOORS = 5;
        let eventSources = {};

        // Crear tarjeta de elevador
        function createElevatorCard(elevatorId) {
            const card = document.createElement('div');
            card.className = 'elevator-card';
            card.id = `elevator-${elevatorId}`;
            card.innerHTML = `
                <div class="elevator-title">${elevatorId}</div>
                <div class="status-display">
                    <div class="status-item">
                        <span class="status-label">Piso Actual</span>
                        <span class="status-value" id="floor-${elevatorId}">-</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">Destino</span>
                        <span class="status-value" id="target-${elevatorId}">-</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">Estado</span>
                        <span class="status-value" id="state-${elevatorId}">-</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">Puerta</span>
                        <span class="status-value" id="door-${elevatorId}">-</span>
                    </div>
                </div>

                <div class="floor-controller">
                    <div class="floor-label">Ir al Piso</div>
                    <div class="floor-buttons">
                        ${Array.from({length: MAX_FLOORS}, (_, i) => i + 1)
                            .map(floor => `<button class="floor-btn" onclick="goToFloor('${elevatorId}', ${floor})">${floor}</button>`)
                            .join('')}
                    </div>
                </div>

                <div class="door-controls">
                    <button class="btn btn-primary" onclick="openDoor('${elevatorId}')">Abrir Puerta</button>
                    <button class="btn btn-secondary" onclick="closeDoor('${elevatorId}')">Cerrar Puerta</button>
                </div>

                <div class="action-controls">
                    <button class="btn btn-danger" onclick="resetElevator('${elevatorId}')">Reiniciar</button>
                </div>
            `;
            return card;
        }

        // Actualizar UI con estado del elevador
        function updateElevatorStatus(elevatorId, state) {
            document.getElementById(`floor-${elevatorId}`).textContent = state.currentFloor;
            document.getElementById(`target-${elevatorId}`).textContent = state.targetFloor;
            document.getElementById(`state-${elevatorId}`).textContent = state.state;
            document.getElementById(`door-${elevatorId}`).textContent = state.door.state;
        }

        // Obtener estado de todos los elevadores
        async function loadElevators() {
            try {
                const response = await fetch(API_BASE);
                const data = await response.json();
                
                if (data.success) {
                    const container = document.getElementById('elevatorsContainer');
                    container.innerHTML = '';
                    
                    Object.entries(data.data).forEach(([elevatorId, state]) => {
                        const card = createElevatorCard(elevatorId);
                        container.appendChild(card);
                        updateElevatorStatus(elevatorId, state);
                        subscribeToEvents(elevatorId);
                    });
                }
            } catch (error) {
                logEvent('ERROR', `Error cargando elevadores: ${error.message}`);
            }
        }

        // Funciones de control
        async function goToFloor(elevatorId, floor) {
            try {
                setButtonLoading(true);
                const response = await fetch(`${API_BASE}/${elevatorId}/go-to-floor`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ targetFloor: floor })
                });

                const data = await response.json();
                if (data.success) {
                    logEvent('GO_TO_FLOOR', `${elevatorId} moviendo al piso ${floor}`);
                    updateElevatorStatus(elevatorId, data.data);
                } else {
                    logEvent('ERROR', `Fallo en ${elevatorId}: ${data.message}`);
                }
            } catch (error) {
                logEvent('ERROR', error.message);
            } finally {
                setButtonLoading(false);
            }
        }

        async function openDoor(elevatorId) {
            try {
                setButtonLoading(true);
                const response = await fetch(`${API_BASE}/${elevatorId}/door/open`, {
                    method: 'POST'
                });

                const data = await response.json();
                if (data.success) {
                    logEvent('DOOR_ACTION', `${elevatorId} abriendo puerta`);
                    updateElevatorStatus(elevatorId, data.data);
                } else {
                    logEvent('ERROR', data.message);
                }
            } catch (error) {
                logEvent('ERROR', error.message);
            } finally {
                setButtonLoading(false);
            }
        }

        async function closeDoor(elevatorId) {
            try {
                setButtonLoading(true);
                const response = await fetch(`${API_BASE}/${elevatorId}/door/close`, {
                    method: 'POST'
                });

                const data = await response.json();
                if (data.success) {
                    logEvent('DOOR_ACTION', `${elevatorId} cerrando puerta`);
                    updateElevatorStatus(elevatorId, data.data);
                } else {
                    logEvent('ERROR', data.message);
                }
            } catch (error) {
                logEvent('ERROR', error.message);
            } finally {
                setButtonLoading(false);
            }
        }

        async function resetElevator(elevatorId) {
            try {
                setButtonLoading(true);
                const response = await fetch(`${API_BASE}/${elevatorId}/reset`, {
                    method: 'POST'
                });

                const data = await response.json();
                if (data.success) {
                    logEvent('RESET', `${elevatorId} reiniciado`);
                    updateElevatorStatus(elevatorId, data.data);
                } else {
                    logEvent('ERROR', data.message);
                }
            } catch (error) {
                logEvent('ERROR', error.message);
            } finally {
                setButtonLoading(false);
            }
        }

        // Suscribirse a eventos SSE
        function subscribeToEvents(elevatorId) {
            if (eventSources[elevatorId]) {
                eventSources[elevatorId].close();
            }

            const eventSource = new EventSource(`${API_BASE}/${elevatorId}/events`);

            eventSource.addEventListener('MOVING', (event) => {
                const data = JSON.parse(event.data);
                logEvent('MOVING', `${elevatorId} en movimiento al piso ${data.state.targetFloor}`);
                updateElevatorStatus(elevatorId, data.state);
            });

            eventSource.addEventListener('ARRIVED', (event) => {
                const data = JSON.parse(event.data);
                logEvent('ARRIVED', `${elevatorId} llegó al piso ${data.state.currentFloor}`);
                updateElevatorStatus(elevatorId, data.state);
            });

            eventSource.addEventListener('DOOR_OPENED', (event) => {
                const data = JSON.parse(event.data);
                logEvent('DOOR_OPENED', `${elevatorId} puerta abierta`);
                updateElevatorStatus(elevatorId, data.state);
            });

            eventSource.addEventListener('DOOR_CLOSED', (event) => {
                const data = JSON.parse(event.data);
                logEvent('DOOR_CLOSED', `${elevatorId} puerta cerrada`);
                updateElevatorStatus(elevatorId, data.state);
            });

            eventSource.addEventListener('ERROR', (event) => {
                const data = JSON.parse(event.data);
                logEvent('ERROR', `${elevatorId}: ${data.message}`);
                updateElevatorStatus(elevatorId, data.state);
            });

            eventSource.addEventListener('RESET', (event) => {
                const data = JSON.parse(event.data);
                logEvent('RESET', `${elevatorId} reiniciado`);
                updateElevatorStatus(elevatorId, data.state);
            });

            eventSource.onerror = () => {
                logEvent('ERROR', `Conexión SSE perdida para ${elevatorId}`);
                eventSource.close();
                setTimeout(() => subscribeToEvents(elevatorId), 3000);
            };

            eventSources[elevatorId] = eventSource;
        }

        // Log de eventos
        function logEvent(type, message) {
            const logDiv = document.getElementById('eventsLog');
            const timestamp = new Date().toLocaleTimeString();
            const eventClass = type === 'ERROR' ? 'error' : (type === 'ARRIVED' || type === 'DOOR_CLOSED' ? 'success' : 'warning');
            
            const eventDiv = document.createElement('div');
            eventDiv.className = `event-item ${eventClass}`;
            eventDiv.innerHTML = `<span class="event-time">[${timestamp}]</span> <span class="event-type">${type}</span>: ${message}`;
            
            logDiv.appendChild(eventDiv);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function setButtonLoading(state) {
            const buttons = document.querySelectorAll('.btn');
            buttons.forEach(btn => {
                btn.classList.toggle('loading', state);
                btn.disabled = state;
            });
        }

        // Inicializar
        loadElevators();
        setInterval(loadElevators, 10000); // Actualizar cada 10 segundos
    </script>
</body>
</html>
